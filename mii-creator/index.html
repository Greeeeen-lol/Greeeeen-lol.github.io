  <script>
    // Suspend AudioContext inside iframe until loading screen finishes
    if (window.parent !== window.self) {
      const OriginalAudioContext = window.AudioContext || window.webkitAudioContext;
      if (OriginalAudioContext) {
        window.suspendedAudioContexts = [];
        window.allowAudioResume = false;

        // Override AudioContext.prototype.resume to block it unless explicitly allowed
        const originalResume = OriginalAudioContext.prototype.resume;
        OriginalAudioContext.prototype.resume = function() {
          if (window.allowAudioResume) {
            return originalResume.apply(this);
          }
          return Promise.resolve();
        };

        const WrappedAudioContext = function(...args) {
          const ctx = new OriginalAudioContext(...args);
          try {
            ctx.suspend();
          } catch (e) {
            console.error("Failed to suspend AudioContext", e);
          }
          window.suspendedAudioContexts.push(ctx);
          return ctx;
        };
        WrappedAudioContext.prototype = OriginalAudioContext.prototype;
        Object.keys(OriginalAudioContext).forEach(key => {
          WrappedAudioContext[key] = OriginalAudioContext[key];
        });
        window.AudioContext = WrappedAudioContext;
        window.webkitAudioContext = WrappedAudioContext;
      }
    }
  </script>
